<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Sub2Monitor</title>
    <script>
      // Prevent FOUC: resolve preference before first paint (default = system).
      (function () {
        try {
          var key = 'sub2monitor-theme-preference'
          var pref = localStorage.getItem(key) || 'system'
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = pref === 'light' ? 'light' : pref === 'dark' ? 'dark' : (systemDark ? 'dark' : 'light')
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>

    <link rel="stylesheet" crossorigin href="/assets/index-CsfGT9cd.css">
  </head>

  </body>
</html>
